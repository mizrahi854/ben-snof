<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>LUXE Barber – ניהול</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <!-- Login Screen -->
  <div id="adminLogin" class="login-screen">
    <div class="login-container">
      <div class="logo-box">
        <span class="logo-mark">L</span>
        <h1>LUXE</h1>
        <p>BARBER ADMIN</p>
      </div>
      <form id="loginForm" class="login-form">
        <input type="password" id="adPass" placeholder="סיסמת ניהול" required />
        <button type="submit" class="btn btn-primary btn-block">כניסה</button>
      </form>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="adminShell" style="display:none" class="admin-shell">
    <header class="admin-header">
      <div class="header-left">
        <h1>LUXE Barber Admin</h1>
        <p>ניהול תורים</p>
      </div>
      <button id="logoutBtn" class="btn btn-outline">התנתק</button>
    </header>

    <div class="admin-content">
      <!-- Tabs -->
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="pending">
          <span class="tab-icon">⏳</span> ממתין לאישור <span class="badge pending-count">0</span>
        </button>
        <button class="admin-tab" data-tab="approved">
          <span class="tab-icon">✅</span> מאושר <span class="badge approved-count">0</span>
        </button>
        <button class="admin-tab" data-tab="rejected">
          <span class="tab-icon">❌</span> נדחה <span class="badge rejected-count">0</span>
        </button>
        <button class="admin-tab" data-tab="settings">
          <span class="tab-icon">⚙️</span> הגדרות
        </button>
      </div>

      <!-- Pending Bookings -->
      <div id="pendingTab" class="admin-tab-content active">
        <div class="tab-header">
          <h2>תורים בממתינים לאישור</h2>
          <p class="tab-desc">אשר או דחה תורים חדשים</p>
        </div>
        <div id="pendingList" class="bookings-list"></div>
      </div>

      <!-- Approved Bookings -->
      <div id="approvedTab" class="admin-tab-content">
        <div class="tab-header">
          <h2>תורים מאושרים</h2>
          <p class="tab-desc">תורים שאושרו והודעות נשלחו</p>
        </div>
        <div id="approvedList" class="bookings-list"></div>
      </div>

      <!-- Rejected Bookings -->
      <div id="rejectedTab" class="admin-tab-content">
        <div class="tab-header">
          <h2>תורים נדחים</h2>
          <p class="tab-desc">תורים שנדחו</p>
        </div>
        <div id="rejectedList" class="bookings-list"></div>
      </div>

      <!-- Settings Tab -->
      <div id="settingsTab" class="admin-tab-content">
        <div class="tab-header">
          <h2>הגדרות</h2>
          <p class="tab-desc">ניהול פרטי המספרה</p>
        </div>
        
        <div class="settings-section">
          <h3>פרטי המספרה</h3>
          <form id="settingsForm" class="settings-form">
            <div class="form-group">
              <label>שם המספרה</label>
              <input type="text" id="barberName" placeholder="LUXE Barber" />
            </div>
            <div class="form-group">
              <label>מספר טלפון</label>
              <input type="tel" id="barberPhone" placeholder="03-1234567" />
            </div>
            <div class="form-group">
              <label>קו וואצאפ</label>
              <input type="tel" id="whatsappNumber" placeholder="972500000000" />
            </div>
            <div class="form-group">
              <label>כתובת</label>
              <input type="text" id="barberAddress" placeholder="רחוב הרצל 12, תל אביב" />
            </div>
            <button type="submit" class="btn btn-primary btn-block">שמור הגדרות</button>
          </form>
        </div>

        <div class="settings-section">
          <h3>שירותים</h3>
          <div id="servicesList" class="services-list"></div>
          <button id="addServiceBtn" class="btn btn-secondary btn-block">הוסף שירות</button>
        </div>

        <div class="settings-section">
          <h3>ספרים</h3>
          <div id="barbersList" class="barbers-list"></div>
          <button id="addBarberBtn" class="btn btn-secondary btn-block">הוסף ספר</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Scripts -->
  <script src="../js/firebase.js" type="module"></script>
  <script src="admin.js" type="module"></script>
</body>
</html>
